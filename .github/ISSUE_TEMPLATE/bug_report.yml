name: Bug report
description: Report a bug or a critical gap in an existing feature of the Editor Automation plugin.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For **new or extra feature ideas**, use
        [Discussions → Ideas](https://github.com/editor-automation-mcp/editor-automation-ue-support/discussions/new?category=ideas)
        instead. This form is only for bugs and critical gaps in features that already exist.
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Bug — something works incorrectly
        - Critical gap — an existing feature is missing something it needs to be usable
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Plugin version
      description: From the plugin's .uplugin VersionName (e.g. 0.3.0).
    validations:
      required: true
  - type: input
    id: engine
    attributes:
      label: Unreal Engine version
      placeholder: "5.6"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS 14 / Ubuntu 22.04"
    validations:
      required: false
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you did, what you expected, and what actually happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest sequence of steps or call() invocations (method + args) that triggers it.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Optional — only if it isn't already clear above.
    validations:
      required: false
