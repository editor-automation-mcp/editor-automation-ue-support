name: Bug report
description: Report a bug or a critical gap in an existing feature of the Editor Automation plugin.
labels: ["type/bug", "status/needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        For **new or extra feature ideas**, use
        [Discussions → Ideas](https://github.com/editor-automation-mcp/editor-automation-ue-support/discussions/new?category=ideas)
        instead. This form is for bugs and critical gaps in features that already exist.
  - type: checkboxes
    id: searched
    attributes:
      label: Before you file
      options:
        - label: I searched existing Issues and Discussions (open and closed) and didn't find a duplicate.
          required: true
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Bug — something works incorrectly
        - Critical gap — an existing feature is missing something it needs to be usable
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest sequence of steps or call() invocations (method + args) that triggers it. Use a real reproduction you actually ran, not a hypothetical one.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Version & environment
      description: Plugin version (.uplugin VersionName), Unreal Engine version, OS, build target.
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Optional. Paste actual log output only — never invented or paraphrased lines.
      render: shell
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Anything else?
      description: Extra context. If this report was drafted with AI assistance, disclose it here.
    validations:
      required: false
