name: Bug report
description: Report a bug or a critical gap in an existing feature of the Editor Automation plugin.
labels: ["type/bug", "status/needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        For **new or extra feature ideas**, use
        [Discussions → Ideas](https://github.com/editor-automation-mcp/editor-automation-ue-support/discussions/new?category=ideas)
        instead. This form is for bugs and critical gaps in features that already exist.
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Bug — something works incorrectly
        - Critical gap — an existing feature is missing something it needs to be usable
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest sequence of steps or call() invocations (method + args) that triggers it. Use a real reproduction you actually ran, not a hypothetical one.
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Plugin version
      description: From the plugin's .uplugin VersionName (e.g. 0.3.0).
    validations:
      required: true
  - type: input
    id: engine
    attributes:
      label: Unreal Engine version
      placeholder: "5.6"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS 14 / Ubuntu 22.04"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (optional)
      render: shell
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Anything else? (optional)
    validations:
      required: false
